.music-outer{max-width:var(--container);margin:0 auto;padding:40px 20px 80px}
.sonus-wrapper{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.sonus-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--accent);padding-bottom:12px;margin-bottom:16px}
.sonus-brand{display:flex;align-items:baseline;gap:8px}
.sonus-brand h1{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:28px;letter-spacing:.02em;color:#8a5a2b}
.sonus-brand span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ink-30);letter-spacing:.2em;text-transform:uppercase}
.sonus-tip{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-30);letter-spacing:.05em}
.sonus-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:12px}
.sonus-tab{padding:8px 14px;border:1px solid var(--border);background:var(--white);color:rgba(20,18,16,.7);border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s}
.sonus-tab:hover{background:rgba(184,107,42,.08)}
.sonus-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sonus-tab .count{font-family:'JetBrains Mono',monospace;font-size:9px;margin-left:6px;opacity:.7}
.sonus-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sonus-search{flex:1;min-width:180px;background:var(--white);border:1px solid var(--border);color:var(--ink);padding:10px 14px;border-radius:4px;font-family:inherit;font-size:13px}
.sonus-search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,107,42,.1)}
.sonus-search::placeholder{color:var(--ink-30);font-style:italic}
.sonus-filter{display:flex;background:var(--white);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.sonus-filter button{background:none;border:none;color:var(--ink-30);padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.sonus-filter button.active{background:var(--accent);color:#fff}
.sonus-tracks{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:6px;background:var(--white);margin-bottom:16px;max-height:400px;overflow-y:auto}
.sonus-track{display:grid;grid-template-columns:30px 1fr auto;gap:14px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.sonus-track:last-child{border-bottom:none}
.sonus-track:hover{background:rgba(184,107,42,.06)}
.sonus-track.playing{background:rgba(184,107,42,.12)}
.sonus-track.playing .track-title{color:#8a5a2b;font-weight:500}
.track-number{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-30);text-align:center}
.track-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.track-title{font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-artist{font-size:11px;color:var(--ink-30);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track-platform{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.2em;padding:3px 7px;border-radius:3px;text-transform:uppercase;border:1px solid}
.track-platform.spotify{color:#5a8a5a;border-color:rgba(90,138,90,.4);background:rgba(90,138,90,.06)}
.track-platform.soundcloud{color:#c97532;border-color:rgba(201,117,50,.4);background:rgba(201,117,50,.06)}
.track-platform.mixcloud{color:#4a7aa8;border-color:rgba(74,122,168,.4);background:rgba(74,122,168,.06)}
.sonus-player{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:0 4px 12px rgba(20,18,16,.06)}
.player-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:16px}
.now-playing{flex:1;min-width:0}
.np-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--ink-30);text-transform:uppercase}
.np-title{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-artist{font-size:11px;color:rgba(20,18,16,.7)}
.platform-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(184,107,42,.1);border:1px solid rgba(184,107,42,.3);color:#8a5a2b;text-decoration:none;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap}
.platform-link:hover{background:rgba(184,107,42,.2)}
.player-frame{border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--warm);height:160px}
.player-frame iframe{width:100%;height:100%;border:none;display:block}
.player-empty{height:160px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border);border-radius:6px;font-family:var(--font-display);font-style:italic;color:var(--ink-30);font-size:14px}
@media(max-width:600px){.sonus-wrapper{padding:16px}.sonus-brand h1{font-size:22px}.sonus-controls{flex-direction:column}.player-info{flex-direction:column;align-items:flex-start}}

let currentPlaylist = 'pl_focus';
let currentTrack = null;
let filter = 'all';
let searchQuery = '';

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getDisplayed() {
  let list = TRACKS.filter(t => t.playlistId === currentPlaylist);
  if (filter !== 'all') list = list.filter(t => t.platform === filter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q));
  }
  return list;
}

function renderTabs() {
  document.getElementById('sonus-tabs').innerHTML = PLAYLISTS.map(p => {
    const count = TRACKS.filter(t => t.playlistId === p.id).length;
    const active = currentPlaylist === p.id ? 'active' : '';
    return `<button class="sonus-tab ${active}" data-id="${p.id}">${escapeHTML(p.name)}<span class="count">${count}</span></button>`;
  }).join('');
}

function renderTracks() {
  const list = getDisplayed();
  const el = document.getElementById('sonus-tracklist');
  if (list.length === 0) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--ink-30);font-style:italic;">沒有符合的曲目</div>';
    return;
  }
  el.innerHTML = list.map((t, i) => {
    const playing = currentTrack && currentTrack.id === t.id ? 'playing' : '';
    return `<div class="sonus-track ${playing}" data-id="${t.id}">
      <div class="track-number">${String(i+1).padStart(2,'0')}</div>
      <div class="track-info">
        <div class="track-title">${escapeHTML(t.title)}</div>
        <div class="track-artist">${escapeHTML(t.artist)}</div>
      </div>
      <div class="track-platform ${t.platform}">${t.platform}</div>
    </div>`;
  }).join('');
}

function renderPlayer() {
  const npTitle = document.getElementById('np-title');
  const npArtist = document.getElementById('np-artist');
  const slot = document.getElementById('player-slot');
  const link = document.getElementById('platform-link');

  if (!currentTrack) {
    npTitle.textContent = '— 選一首歌開始 —';
    npArtist.innerHTML = '&nbsp;';
    slot.innerHTML = '<div class="player-empty">尚未播放</div>';
    link.style.display = 'none';
    return;
  }
  const t = currentTrack;
  npTitle.textContent = t.title;
  npArtist.textContent = t.artist;
  link.href = t.url;
  link.style.display = 'inline-flex';

  let embedSrc = '';
  if (t.platform === 'spotify') {
    embedSrc = t.url.replace('open.spotify.com/', 'open.spotify.com/embed/').replace('spotify:', '');
  } else if (t.platform === 'soundcloud') {
    embedSrc = `https://w.soundcloud.com/player/?url=${encodeURIComponent(t.url)}&auto_play=true&visual=true&hide_related=true&show_comments=false&show_user=true`;
  } else if (t.platform === 'mixcloud') {
    const path = t.url.replace(/^https?:\/\/(www\.)?mixcloud\.com/, '');
    embedSrc = `https://player-widget.mixcloud.com/widget/iframe/?hide_cover=1&autoplay=1&feed=${encodeURIComponent(path)}`;
  }
  slot.innerHTML = `<div class="player-frame"><iframe src="${embedSrc}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
}

function render() { renderTabs(); renderTracks(); }

document.body.addEventListener('click', (e) => {
  const tab = e.target.closest('.sonus-tab');
  if (tab) {
    currentPlaylist = tab.dataset.id;
    searchQuery = '';
    document.getElementById('sonus-search').value = '';
    render();
    return;
  }
  const track = e.target.closest('.sonus-track');
  if (track) {
    const t = TRACKS.find(x => x.id === track.dataset.id);
    if (t) { currentTrack = t; renderPlayer(); renderTracks(); }
    return;
  }
  const filterBtn = e.target.closest('.sonus-filter button');
  if (filterBtn) {
    document.querySelectorAll('.sonus-filter button').forEach(b => b.classList.remove('active'));
    filterBtn.classList.add('active');
    filter = filterBtn.dataset.filter;
    renderTracks();
  }
});

document.getElementById('sonus-search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderTracks();
});

render();
renderPlayer();
</script>
