const ARTICLES = {
  1:{
    cat:'指數投資',date:'2025 年 4 月 24 日',
    title:'Fed 維持利率不變，全球 ETF 資金流入創今年新高',
    img:'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=1400&q=85&auto=format&fit=crop',
    lead:'聯準會在本次會議決定維持基準利率於 5.25%～5.50% 區間不變，市場普遍解讀為偏鴿派立場。這個訊號帶動全球股市回溫，追蹤全球市場的 ETF 單週淨流入達 420 億美元，為今年以來最大單週流入規模。',
    body:`<h2>利率不變，對指數投資人<em>意味著什麼</em>？</h2>
<p>許多人以為「利率不變」是個沒有訊息量的中立決定。但對指數投資人來說，Fed 按兵不動往往是市場重新定價風險資產的契機。當固定收益工具的吸引力不再上升，資金自然開始重新流向股市——而追蹤整體市場的 ETF 正是最直接的受益者。</p>
<blockquote><p>真正的指數投資，不是預測利率，而是讓利率的每一次變動都成為你持倉的一部分。</p></blockquote>
<p>本週全球主要指數 ETF 均出現不同程度的資金流入。追蹤全球市場的 VT 單週漲幅約 1.8%，追蹤美國市場的 VOO 則上漲約 2.1%。對長期持有指數 ETF 的投資人而言，這週的波動不過是時間軸上的一個微小漣漪。</p>
<h2>台灣投資人應如何看待這波<em>行情</em>？</h2>
<p>台灣投資人若持有 0050、00878 等台股 ETF，短期的連動效果相對有限，因為台股有其自身的基本面驅動力。但若同時持有追蹤全球或美股的 ETF，則這波行情帶來的帳面增值是真實的。</p>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1543286386-713bdd548da4?w=1000&q=80&auto=format&fit=crop" alt="ETF 投資組合圖表" style="height:360px"/>
  <figcaption>全球 ETF 資金流向，2025 年 Q1～Q2</figcaption>
</figure>
<p>更重要的是：這樣的市場行情，不應改變你原本設定好的定期定額計畫。市場好的時候繼續買，市場壞的時候也繼續買——這才是指數投資最核心的精神。</p>
<p>如果你還沒有建立自動化的定期投資計畫，現在是一個很好的時機開始思考。不是因為市場漲了才要買，而是因為任何時候都是開始的好時機。</p>`,
    tags:['指數投資','ETF','Fed','美股','全球市場'],
    related:[2,5]
  },
  2:{
    cat:'旅行體驗',date:'2025 年 4 月 22 日',
    title:'春日東京：在新宿御苑想通了資產配置這件事',
    img:'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1400&q=85&auto=format&fit=crop',
    lead:'四月的東京，空氣裡有一種輕盈的重量。我在新宿御苑的長椅上坐了整整一個下午，看著千株染井吉野次第落下，突然理解了一件和投資有關的事。',
    body:`<h2>分散，不只是投資的智慧</h2>
<p>新宿御苑種了超過 1,000 株不同品種的櫻花樹。早開的、晚開的、顏色深的、顏色淺的，交錯排列，讓這裡的花期延續比其他地方長了將近兩週。</p>
<p>這不就是資產配置最直白的比喻嗎？不把全部的錢押在單一資產，就像不讓整座園子只種一種花——當市場的春天來臨，你永遠有某個部位正在盛開。</p>
<blockquote><p>在新宿御苑，我第一次用眼睛而不是腦子，真正理解了分散投資這件事。</p></blockquote>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1000&q=80&auto=format&fit=crop" alt="東京春天櫻花" style="height:380px"/>
  <figcaption>四月的新宿御苑，染井吉野盛開</figcaption>
</figure>
<h2>旅行的另一層<em>複利</em></h2>
<p>這趟東京四天的花費，含來回機票與住宿，大約台幣三萬五千元。對我來說，這不只是消費——這是我用過去幾年定期投資的股息，支付的一趟思考之旅。</p>
<p>當你的被動收入能夠支付你的旅行費用，旅行的意義就改變了。它不再是「奢侈品」，而是你選擇的生活方式的一部分。財富自由，從來不是某個數字，而是當你訂機票時不需要看銀行帳戶餘額的那種自在。</p>`,
    tags:['東京','日本','旅行哲學','資產配置','春天'],
    related:[1,4]
  },
  3:{
    cat:'旅行工具',date:'2025 年 4 月 18 日',
    title:'用 35,000 里程飛日本商務艙，完整攻略分享',
    img:'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1400&q=85&auto=format&fit=crop',
    lead:'很多人以為商務艙是有錢人才能享受的東西。但過去兩年，我已經用里程兌換了三次商務艙機票，每次花費的現金接近於零。這篇文章把完整的方法拆解給你看。',
    body:`<h2>長榮無限萬哩遊，<em>台灣最值得累積的里程計畫</em></h2>
<p>如果你只打算認真累積一個里程計畫，我的建議是長榮航空的無限萬哩遊。從台灣出發飛日本，來回商務艙只需 50,000 里程，而且長榮的商務艙品質在亞太地區名列前茅。</p>
<blockquote><p>里程不是有錢人的遊戲，而是懂得系統化累積的人的工具。</p></blockquote>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?w=1000&q=80&auto=format&fit=crop" alt="飛機商務艙座位" style="height:340px"/>
  <figcaption>長榮航空商務艙，台北飛東京航線</figcaption>
</figure>
<h2>三個月累積 35,000 里程的<em>具體方法</em></h2>
<p>我在不出國的情況下，透過以下三個管道在三個月內累積了 35,000 里程：一是申辦聯名信用卡的開卡禮（約 15,000 里程）；二是日常消費刷卡累積（每月約 5,000 至 8,000 里程）；三是參與里程促銷活動（一次性獲得 5,000 里程）。</p>
<p>關鍵不在於你花了多少錢，而在於你把原本就會花的錢，有系統地導入里程累積的管道。</p>
<p>想查詢你的里程可以兌換哪條航線、哪個艙等，可以使用我們的<a href="tools.html" style="color:var(--accent)">里程兌換計算機</a>，輸入出發地和目的地就能立即查詢所有航空公司的所需里程數。</p>`,
    tags:['里程','長榮','商務艙','信用卡','旅行工具'],
    related:[7,6]
  },
  4:{
    cat:'旅行哲學',date:'2025 年 4 月 15 日',
    title:'峇里島日落教我的複利哲學',
    img:'https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=1400&q=85&auto=format&fit=crop',
    lead:'在烏布的稻田邊，我第一次真正理解「時間是最強的複利」這句話的重量。那是一個普通的黃昏，但它改變了我對時間的整個理解。',
    body:`<h2>稻田裡的<em>時間課</em></h2>
<p>峇里島烏布的稻田，一年可以收穫兩到三次。每一粒稻子都是上一個季節播種的結果，而下一季的豐收，又依賴這一季留下的種子。農夫不焦慮，因為他知道時間在他這一邊。</p>
<p>我坐在田邊看著夕陽，想到了我的投資帳戶。五年前我開始定期定額投入全球 ETF，當時帳戶裡的錢少得可憐。但每一筆投入，都在為下一筆的複利增長播種。</p>
<blockquote><p>複利的本質，就是讓今天的你，為明天的你種下一粒種子。</p></blockquote>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1555400038-63f5ba517a47?w=1000&q=80&auto=format&fit=crop" alt="峇里島烏布梯田" style="height:380px"/>
  <figcaption>峇里島烏布，Tegallalang 梯田</figcaption>
</figure>
<h2>旅行，是對自己<em>最好的投資</em></h2>
<p>這趟峇里島的旅行，我花了台幣兩萬二千元，待了五天。帶回來的，是對複利一個全新的身體理解——不只是腦子裡的公式，而是眼睛看見、皮膚感受過的真實體悟。</p>
<p>如果你還沒有開始投資，現在就是最好的時機。如果你已經在投資，現在就是旅行的好時機。兩件事從來不是互斥的。</p>`,
    tags:['峇里島','旅行哲學','複利','時間','指數投資'],
    related:[2,1]
  },
  5:{
    cat:'指數投資',date:'2025 年 4 月 12 日',
    title:'00878 vs VT：台灣投資人如何選擇全球佈局',
    img:'https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?w=1400&q=85&auto=format&fit=crop',
    lead:'00878 是台灣最受歡迎的高股息 ETF 之一；VT 則追蹤全球股市，涵蓋 9,000 多支股票。兩者之間，台灣的指數投資人應該怎麼選？這篇文章分享我的思考框架。',
    body:`<h2>高股息 vs 全市場，<em>不是非此即彼</em></h2>
<p>很多人把這個問題框架成「高股息好還是全市場好」的二元對立，但更準確的問法是：你的投資目標是什麼？你在哪個人生階段？你能接受多少波動？</p>
<blockquote><p>沒有最好的 ETF，只有最適合你當前處境的 ETF。</p></blockquote>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1000&q=80&auto=format&fit=crop" alt="投資組合比較分析" style="height:340px"/>
  <figcaption>資產配置的核心，在於理解自己的投資目標</figcaption>
</figure>
<h2>我的實際配置<em>邏輯</em></h2>
<p>我個人的做法是：以 VT（全球市場）作為核心持倉，佔整體投資組合的 70%；以 00878 作為衛星配置，佔 20%；保留 10% 的現金作為機動資金。</p>
<p>這樣的配置讓我能享受全球市場的長期增長，同時透過 00878 的季配息，在需要現金流的時候有穩定的來源。不是哪個更好，而是各司其職。</p>`,
    tags:['00878','VT','ETF比較','台股','全球市場'],
    related:[1,8]
  },
  6:{
    cat:'旅行體驗',date:'2025 年 4 月 8 日',
    title:'京都慢行：花費最少，收穫最多的旅行方式',
    img:'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=1400&q=85&auto=format&fit=crop',
    lead:'一個人、一張 JR Pass、七天，用最少的預算走遍京都最美的角落。這不只是一篇旅遊攻略，更是一次關於「慢」的練習。',
    body:`<h2>京都教我的<em>慢速投資</em></h2>
<p>京都沒有東京的速度感。這裡的美，需要你放慢腳步才能看見——早晨六點的伏見稻荷，還沒有觀光客的鳥居隧道；傍晚五點的哲學之道，楓葉的倒影在水面緩緩移動。</p>
<p>慢下來，才能看見真正重要的東西。這和指數投資的哲學驚人地相似：停止追逐短期波動，慢下來讓時間做它的工作。</p>
<blockquote><p>京都的美，在於它從不急著讓你看見。指數投資的回報，也是如此。</p></blockquote>
<figure class="article-inline-img">
  <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1000&q=80&auto=format&fit=crop" alt="京都哲學之道" style="height:380px"/>
  <figcaption>京都哲學之道，秋日午後</figcaption>
</figure>
<h2>七天京都的<em>實際花費</em></h2>
<p>這趟旅行的總花費約台幣三萬元，含來回機票、JR Pass、青年旅館七晚住宿，以及所有餐飲。平均每天花費不到台幣四千三百元。</p>
<p>想試算自己的旅行預算？可以使用我們的<a href="tools.html" style="color:var(--accent)">旅費試算工具</a>，輸入出發地、目的地、人數與天數，自動幫你估算完整旅費。</p>`,
    tags:['京都','日本','旅行體驗','慢旅行','預算旅遊'],
    related:[2,7]
